<header class="site-header fixed top-0 left-0 w-full py-4 bg-transparent z-[99] transition duration-300">
    <div class="container px-4">
        <div class="flex items-center justify-between items-center w-full">
            <div class="">
                <if condition="page === 'offer'">
                    <a href="#top" class="w-[130px] lg:w-[202px] block">
                        <span class="sr-only">Logo</span>
                        <img width="202" src="logo.png" class="w-full">
                    </a>
                </if>
                <else>
                    <a href="#top" class="w-[130px] lg:w-[202px] block">
                        <span class="sr-only">Logo</span>
                        <img width="202" src="logo.png">
                    </a>
                </else>

            </div>
            <div id="header-phone-placeholder"></div>
            <script>
                setTimeout(function() {
                    var phoneNumber = '+1 213 523 3332';
                    var phoneTel = 'tel:+12135233332';

                    var placeholder = document.getElementById('header-phone-placeholder');
                    if (placeholder) {
                        var a = document.createElement('a');
                        a.href = phoneTel;
                        a.id = 'header-phone-link';
                        a.className = 'flex items-center';
                        a.title = 'phone';
                        a.innerHTML =
                            '<div class="md:mr-3"><svg class="w-10" width="36" height="37" viewBox="0 0 36 37" fill="none" xmlns="http://www.w3.org/2000/svg"><rect y="0.30957" width="36" height="36" rx="18" fill="#009FE3"/><path d="M25.8761 23.2198C25.3376 22.7683 22.1796 20.7685 21.6547 20.8603C21.4083 20.904 21.2198 21.1141 20.7152 21.716C20.4819 22.0123 20.2256 22.2897 19.9488 22.5459C19.4417 22.4233 18.9507 22.2414 18.4863 22.0037C16.6647 21.1169 15.1931 19.6449 14.3068 17.8231C14.0692 17.3586 13.8872 16.8677 13.7647 16.3605C14.0208 16.0837 14.2983 15.8274 14.5945 15.5941C15.1958 15.0895 15.4065 14.9023 15.4503 14.6546C15.5421 14.1285 13.5404 10.9717 13.0907 10.4333C12.9022 10.2103 12.7309 10.0605 12.5116 10.0605C11.8758 10.0605 9 13.6165 9 14.0773C9 14.1149 9.06161 17.8169 13.737 22.5736C18.4937 27.2489 22.1956 27.3106 22.2332 27.3106C22.694 27.3106 26.25 24.4347 26.25 23.7989C26.25 23.5796 26.1003 23.4084 25.8761 23.2198Z" fill="white"/></svg></div>' +
                            '<div class="hidden lg:flex flex-col phone-text text-dark text-xl leading-tight">' +
                                '<span class="block text-base">Any Questions?</span>' +
                                '<em id="header-phone-number-display" class="font-bold not-italic tracking-tighter">' + phoneNumber + '</em>' +
                            '</div>';
                        placeholder.replaceWith(a);

                        var phoneTextEl = a.querySelector('.phone-text');
                        if (phoneTextEl) {
                            var emEl = phoneTextEl.querySelector('em');
                            if (emEl) {
                                var unsliced = emEl.textContent;
                                emEl.textContent = unsliced.slice(0, -2) + '...';
                                phoneTextEl.addEventListener('click', function() {
                                    if (window.innerWidth < 1000) {
                                        window.location.href = phoneTel;
                                    } else {
                                        emEl.textContent = unsliced;
                                    }
                                });
                            }
                        }
                    }
                }, 5000);
            </script>
        </div>
    </div>
</header>
